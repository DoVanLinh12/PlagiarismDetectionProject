services:
  postgres:
    image: postgres:15.15-alpine
    container_name: plagiarism_postgres1
    restart: always
    environment:
      POSTGRES_DB: plagiarism
      POSTGRES_USER: plagiarism
      POSTGRES_PASSWORD: plagiarism
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    networks:
      - plagiarism
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: plagiarism_minio1
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin1
      MINIO_ROOT_PASSWORD: minioadmin1
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - plagiarism
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: plagiarism_minio_init1
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - plagiarism
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin1 minioadmin1;
      mc mb --ignore-existing local/milvus-bucket;
      mc mb --ignore-existing local/plagiarism-files;
      exit 0;
      "
    restart: on-failure

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: plagiarism_milvus_etcd1
    restart: always
    command: >
      etcd
      -advertise-client-urls=http://0.0.0.0:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    ports:
      - "2379:2379"
    networks:
      - plagiarism

  milvus:
    image: milvusdb/milvus:v2.4.3
    container_name: plagiarism_milvus1
    restart: always
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin1
      MINIO_SECRET_ACCESS_KEY: minioadmin1
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: milvus-bucket
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      milvus-etcd:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - plagiarism

  attu:
    image: zilliz/attu:v2.4
    container_name: plagiarism_attu1
    restart: always
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8000:3000"
    depends_on:
      - milvus
    networks:
      - plagiarism

volumes:
  postgres_data:
  minio_data:
  etcd_data:
  milvus_data:

networks:
  plagiarism:
    name: plagiarism
    driver: bridge